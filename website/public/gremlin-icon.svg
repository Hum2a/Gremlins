<?xml version="1.0" encoding="UTF-8"?>
<!--
  Vector match for Gremlins IconGenerator.RenderGremlin (32◊32 logical space).
  Keep in sync with IconGenerator.cs when changing artwork.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="headGrad" x1="16" y1="5" x2="16" y2="28.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2EA83E"/>
      <stop offset="100%" stop-color="#0A3414"/>
    </linearGradient>
    <linearGradient id="hornGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="32" y2="32" gradientTransform="rotate(55 16 16)">
      <stop offset="0%" stop-color="#378C30"/>
      <stop offset="100%" stop-color="#0F3012"/>
    </linearGradient>
    <linearGradient id="irisGradL" x1="6" y1="11" x2="12" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE63C"/>
      <stop offset="100%" stop-color="#C88C00"/>
    </linearGradient>
    <linearGradient id="irisGradR" x1="16" y1="11" x2="22" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE63C"/>
      <stop offset="100%" stop-color="#C88C00"/>
    </linearGradient>
  </defs>

  <!-- Soft cast shadow -->
  <ellipse cx="16" cy="26.5" rx="10.5" ry="3.5" fill="#000000" opacity="0.216"/>

  <!-- Head -->
  <ellipse cx="16" cy="16.75" rx="12.8" ry="11.75" fill="url(#headGrad)"/>

  <!-- Cheek / forehead gloss -->
  <ellipse cx="16" cy="14" rx="9" ry="6.5" fill="#C8FFC8" opacity="0.275"/>

  <!-- Inner rim light -->
  <ellipse cx="16" cy="16.75" rx="12.8" ry="11.75" fill="none" stroke="#39FF28" stroke-opacity="0.431" stroke-width="0.72"/>

  <!-- Outer silhouette -->
  <ellipse cx="16" cy="16.75" rx="12.8" ry="11.75" fill="none" stroke="#061C0A" stroke-opacity="0.863" stroke-width="1.1" stroke-linejoin="round"/>

  <!-- Horns -->
  <polygon points="4,11 0.5,2 9,7" fill="url(#hornGrad)" stroke="#0A2A0E" stroke-opacity="0.627" stroke-width="0.605" stroke-linejoin="round"/>
  <polygon points="28,11 31.5,2 23,7" fill="url(#hornGrad)" stroke="#0A2A0E" stroke-opacity="0.627" stroke-width="0.605" stroke-linejoin="round"/>

  <!-- Left eye -->
  <ellipse cx="9" cy="14" rx="4.2" ry="4.2" fill="none" stroke="#39FF28" stroke-opacity="0.392" stroke-width="0.65"/>
  <circle cx="9" cy="14" r="3" fill="#F5F8F2"/>
  <circle cx="9" cy="14" r="3" fill="url(#irisGradL)"/>
  <circle cx="7.45" cy="12.65" r="1.55" fill="#080808" fill-opacity="0.98"/>
  <ellipse cx="7.9" cy="12.2" rx="0.85" ry="0.85" fill="#FFFFFF" fill-opacity="0.94"/>

  <!-- Right eye -->
  <ellipse cx="19" cy="14" rx="4.2" ry="4.2" fill="none" stroke="#39FF28" stroke-opacity="0.392" stroke-width="0.65"/>
  <circle cx="19" cy="14" r="3" fill="#F5F8F2"/>
  <circle cx="19" cy="14" r="3" fill="url(#irisGradR)"/>
  <circle cx="17.45" cy="12.65" r="1.55" fill="#080808" fill-opacity="0.98"/>
  <ellipse cx="17.9" cy="12.2" rx="0.85" ry="0.85" fill="#FFFFFF" fill-opacity="0.94"/>

  <!-- Grin: neon arc (bounding 9.5,15  13◊12 í center 16,21, rx 6.5, ry 6, 15∞ sweep 150∞) -->
  <path d="M 22.278 22.553 A 6.5 6 0 0 1 9.722 22.553" fill="none" stroke="#39FF28" stroke-opacity="0.98" stroke-width="1.35" stroke-linecap="round"/>

  <!-- Subtle darker smile line (10,15.5  12◊11 í rx 6, ry 5.5, 20∞ sweep 140∞) -->
  <path d="M 21.638 22.881 A 6 5.5 0 0 1 10.362 22.881" fill="none" stroke="#000000" stroke-opacity="0.353" stroke-width="0.495" stroke-linecap="round"/>
</svg>
